<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>inkmote — single-file deck (P0 acceptance)</title>
    <style>
      :root {
        --bg: rgb(244, 243, 238);
        --ink: rgb(17, 19, 24);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial,
          sans-serif;
      }
      .deck {
        position: relative;
        z-index: 1;
        height: 100vh;
      }
      /* Slides toggle by visibility/opacity, NOT display — off-screen slides keep
         layout so clientWidth == viewport width (needed for canvas auto-sizing). */
      section.slide {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 8vh 6vw;
        box-sizing: border-box;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      section.slide.active {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
      }
      /* Per-slide live canvas: full-bleed, behind slide text, never intercepts clicks. */
      section.slide > canvas.ink-live {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      /* Text content sits above the per-slide canvas. */
      section.slide > *:not(canvas.ink-live) {
        position: relative;
        z-index: 1;
      }
      h1[data-ink="title"] {
        font-size: clamp(2.5rem, 9vw, 7rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0;
      }
      [data-ink="stat"] {
        font-size: clamp(4rem, 18vw, 14rem);
        font-weight: 800;
        line-height: 1;
        margin: 0;
      }
      .caption {
        margin-top: 1.5rem;
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        opacity: 0.7;
        max-width: 36ch;
      }
      .hint {
        position: fixed;
        bottom: 1rem;
        right: 1.2rem;
        z-index: 2;
        font-size: 0.8rem;
        opacity: 0.45;
      }
      /* Print: every slide region prints its OWN static frame rendered into the
         per-slide live canvas. Show all slides, hide nav hint. */
      @media print {
        section.slide {
          position: relative;
          visibility: visible;
          opacity: 1;
          page-break-after: always;
          height: 100vh;
        }
        /* Hide live canvases on print — legible DOM text is what prints. */
        section.slide > canvas.ink-live {
          display: none;
        }
        .hint {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="deck">
      <!-- Slide 0: cover — h1 forms via textReveal -->
      <section class="slide active" id="slide-cover">
        <!-- Per-slide live canvas. aria-hidden set by textReveal component. -->
        <canvas class="ink-live"></canvas>
        <h1 data-ink="title">Ink in Motion</h1>
      </section>

      <!-- Slide 1: section transition — sceneMorph between cover dust and stat dust -->
      <section class="slide" id="slide-transition">
        <canvas class="ink-live" aria-hidden="true"></canvas>
        <h1 data-ink="title">From idea to impact</h1>
        <p class="caption">A field of particles morphs between scenes.</p>
      </section>

      <!-- Slide 2: body — big stat -->
      <section class="slide" id="slide-stat">
        <canvas class="ink-live" aria-hidden="true"></canvas>
        <div data-ink="stat" data-value="95%">95%</div>
        <p class="caption">of the bundle is core engine, not chrome.</p>
      </section>

      <!-- Slide 3: image → particles demo.
           Uses an offscreen canvas as the source image so the demo is
           fully self-contained (no binary assets, no network).
           In a real workflow, swap the emblem canvas for any AI-generated
           HTMLImageElement — the result is identical. -->
      <section class="slide" id="slide-image">
        <!-- canvas aria-label set by imageReveal when alt is provided -->
        <canvas class="ink-live"></canvas>
        <p class="caption" style="margin-top:0;margin-bottom:1rem;opacity:0.55;font-size:clamp(0.75rem,1.5vw,1rem);">Any image → particles</p>
      </section>
    </main>

    <div class="hint">← / → to navigate · ⌘P to print (static frames)</div>

    <!-- Relative IIFE: opens by double-click, no server. Exposes window.Inkmote. -->
    <script src="../dist/index.global.js"></script>
    <script>
      (function () {
        var Inkmote = window.Inkmote;
        var N = 8000; // fixed global particle count (spec: tier 'normal')
        var FONT = "800 12vw ui-sans-serif, system-ui, sans-serif";

        // A/B shape hook: ?shape=round|soft|square (default: 'square')
        var shapeParam = new URLSearchParams(window.location.search).get('shape');
        var SHAPE = (shapeParam === 'round' || shapeParam === 'soft' || shapeParam === 'square')
          ? shapeParam : undefined;

        var slides = Array.prototype.slice.call(
          document.querySelectorAll("section.slide")
        );
        var idx = 0;

        // Seeded formations shared by the morph slide (deterministic — spec §8).
        var ptsFrom;
        var ptsTo;

        // One InkStage per slide, each bound to that slide's own canvas.
        var stages = [];

        function buildStages() {
          // --- Slide 0: cover ---
          // textReveal sets aria-hidden on the canvas; its onSettle fades the
          // COVER canvas to opacity:0 and shows the h1 — affects only this slide.
          var coverCanvas = slides[0].querySelector('canvas.ink-live');
          var coverH1 = slides[0].querySelector('[data-ink="title"]');
          stages[0] = Inkmote.textReveal(coverCanvas, coverH1, {
            text: coverH1.textContent,
            font: FONT,
            n: N,
            seed: 7,
            shape: SHAPE,
          });

          // --- Slide 1: morph ---
          var morphCanvas = slides[1].querySelector('canvas.ink-live');
          stages[1] = Inkmote.sceneMorph(morphCanvas, {
            from: ptsFrom,
            to: ptsTo,
            n: N,
            seed: 42,
            shape: SHAPE,
          });

          // --- Slide 2: stat number ---
          var statCanvas = slides[2].querySelector('canvas.ink-live');
          var statEl = slides[2].querySelector('[data-ink="stat"]');
          stages[2] = Inkmote.textReveal(statCanvas, statEl, {
            text: statEl.getAttribute("data-value"),
            font: FONT,
            n: N,
            seed: 11,
            shape: SHAPE,
          });

          // --- Slide 3: image → particles ---
          // Build a high-contrast emblem on an offscreen canvas so the demo needs
          // no binary assets. A real workflow would pass an HTMLImageElement here.
          var emblem = document.createElement('canvas');
          emblem.width = 512;
          emblem.height = 512;
          var ec = emblem.getContext('2d');
          if (ec) {
            ec.fillStyle = '#f4f3ee';
            ec.fillRect(0, 0, 512, 512);
            ec.beginPath();
            ec.arc(256, 256, 200, 0, Math.PI * 2);
            ec.strokeStyle = '#11131A';
            ec.lineWidth = 36;
            ec.stroke();
            ec.beginPath();
            ec.arc(256, 256, 100, 0, Math.PI * 2);
            ec.fillStyle = '#11131A';
            ec.fill();
          }
          var imageCanvas = slides[3].querySelector('canvas.ink-live');
          stages[3] = Inkmote.imageReveal(imageCanvas, emblem, {
            n: N,
            seed: 3,
            shape: SHAPE,
            alt: 'A bold ring emblem assembled from ink particles',
          });
        }

        function show(i) {
          idx = (i + slides.length) % slides.length;
          slides.forEach(function (s, k) {
            s.classList.toggle("active", k === idx);
          });
          // Navigation is driven entirely by the CSS .active class toggling
          // visibility/opacity — no stage call needed here.
        }

        window.addEventListener("keydown", function (e) {
          if (e.key === "ArrowRight" || e.key === " ") {
            e.preventDefault();
            show(idx + 1);
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            show(idx - 1);
          }
        });

        // On print, snapshot each stage's current settled frame into its slide's canvas.
        window.addEventListener("beforeprint", function () {
          stages.forEach(function (st, i) {
            if (!st) return;
            var slideCanvas = slides[i].querySelector('canvas.ink-live');
            var rect = { x: 0, y: 0, w: slideCanvas.clientWidth, h: slideCanvas.clientHeight };
            st.snapshotFor(rect);
          });
        });

        // Fonts: canvas text sampling must await document.fonts.ready (spec §8).
        document.fonts.ready.then(function () {
          var rngFrom = Inkmote.createRng(41);
          var rngTo   = Inkmote.createRng(42);
          ptsFrom = Inkmote.fromText("idea",   N, { font: FONT, levels: 24 }, rngFrom);
          ptsTo   = Inkmote.fromText("impact", N, { font: FONT, levels: 24 }, rngTo);
          buildStages();
          show(0);
        });
      })();
    </script>
  </body>
</html>
