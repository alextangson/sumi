<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>inkmote — single-file deck (P0 acceptance)</title>
    <style>
      :root {
        --bg: rgb(244, 243, 238);
        --ink: rgb(17, 19, 24);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial,
          sans-serif;
      }
      /* Shared full-bleed particle canvas: behind slides, never intercepts clicks. */
      #ink {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .deck {
        position: relative;
        z-index: 1;
        height: 100vh;
      }
      /* Slides toggle by visibility/opacity, NOT display — off-screen slides keep
         layout so canvas text sampling has real geometry. */
      section.slide {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 8vh 6vw;
        box-sizing: border-box;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      section.slide.active {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
      }
      h1[data-ink="title"] {
        font-size: clamp(2.5rem, 9vw, 7rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0;
      }
      [data-ink="stat"] {
        font-size: clamp(4rem, 18vw, 14rem);
        font-weight: 800;
        line-height: 1;
        margin: 0;
      }
      .caption {
        margin-top: 1.5rem;
        font-size: clamp(1rem, 2.5vw, 1.5rem);
        opacity: 0.7;
        max-width: 36ch;
      }
      .hint {
        position: fixed;
        bottom: 1rem;
        right: 1.2rem;
        z-index: 2;
        font-size: 0.8rem;
        opacity: 0.45;
      }
      /* Print: every slide region prints its OWN static frame, not the live canvas. */
      @media print {
        section.slide {
          position: relative;
          visibility: visible;
          opacity: 1;
          page-break-after: always;
          height: 100vh;
        }
        #ink {
          display: none;
        }
        .hint {
          display: none;
        }
        .print-frame {
          display: block;
        }
      }
      .print-frame {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Single shared canvas for all slides. aria-hidden per spec §8 (native text a11y). -->
    <canvas id="ink" aria-hidden="true"></canvas>

    <main class="deck">
      <!-- Slide 0: cover — h1 forms via textReveal -->
      <section class="slide active" id="slide-cover">
        <h1 data-ink="title">Ink in Motion</h1>
        <canvas class="print-frame" aria-hidden="true"></canvas>
      </section>

      <!-- Slide 1: section transition — sceneMorph between cover dust and stat dust -->
      <section class="slide" id="slide-transition">
        <h1 data-ink="title">From idea to impact</h1>
        <p class="caption">A field of particles morphs between scenes.</p>
        <canvas class="print-frame" aria-hidden="true"></canvas>
      </section>

      <!-- Slide 2: body — big stat -->
      <section class="slide" id="slide-stat">
        <div data-ink="stat" data-value="95%">95%</div>
        <p class="caption">of the bundle is core engine, not chrome.</p>
        <canvas class="print-frame" aria-hidden="true"></canvas>
      </section>

      <!-- Slide 3: image → particles demo.
           Uses an offscreen canvas as the source image so the demo is
           fully self-contained (no binary assets, no network).
           In a real workflow, swap `emblемCanvas` for any AI-generated
           HTMLImageElement — the result is identical. -->
      <section class="slide" id="slide-image">
        <p class="caption" style="margin-top:0;margin-bottom:1rem;opacity:0.55;font-size:clamp(0.75rem,1.5vw,1rem);">Any image → particles</p>
        <canvas class="print-frame" aria-hidden="true"></canvas>
      </section>
    </main>

    <div class="hint">← / → to navigate · ⌘P to print (static frames)</div>

    <!-- Relative IIFE: opens by double-click, no server. Exposes window.Inkmote. -->
    <script src="../dist/index.global.js"></script>
    <script>
      (function () {
        var Inkmote = window.Inkmote;
        var N = 8000; // fixed global particle count (spec: tier 'normal')
        var FONT = "800 12vw ui-sans-serif, system-ui, sans-serif";

        // A/B shape hook: ?shape=round|soft|square (default: 'square')
        var shapeParam = new URLSearchParams(window.location.search).get('shape');
        var SHAPE = (shapeParam === 'round' || shapeParam === 'soft' || shapeParam === 'square')
          ? shapeParam : undefined;

        var canvas = document.getElementById("ink");
        var slides = Array.prototype.slice.call(
          document.querySelectorAll("section.slide")
        );
        var idx = 0;

        // Seeded formations shared by the morph slide (deterministic — spec §8).
        // Declared here so buildStages() can reference them; assigned inside
        // document.fonts.ready.then() so the web font is loaded before sampling.
        var ptsFrom;
        var ptsTo;

        // One InkStage per slide, each bound to the same shared canvas.
        var stages = [];

        function fullBleedRect() {
          return { x: 0, y: 0, w: window.innerWidth, h: window.innerHeight };
        }

        function buildStages() {
          // Slide 0: title forms from particles, then hands off to the real <h1>.
          var coverH1 = slides[0].querySelector('[data-ink="title"]');
          stages[0] = Inkmote.textReveal(canvas, coverH1, {
            text: coverH1.textContent,
            font: FONT,
            n: N,
            seed: 7,
            shape: SHAPE,
          });

          // Slide 1: morph between the two seeded formations.
          stages[1] = Inkmote.sceneMorph(canvas, {
            from: ptsFrom,
            to: ptsTo,
            n: N,
            seed: 42,
            shape: SHAPE,
          });

          // Slide 2: stat number forms from particles, hands off to real text.
          var statEl = slides[2].querySelector('[data-ink="stat"]');
          stages[2] = Inkmote.textReveal(canvas, statEl, {
            text: statEl.getAttribute("data-value"),
            font: FONT,
            n: N,
            seed: 11,
            shape: SHAPE,
          });

          // Slide 3: image → particles.
          // Build a high-contrast emblem on an offscreen canvas so the demo needs
          // no binary assets. A real workflow would pass an HTMLImageElement here —
          // e.g. an AI-generated photo — identically.
          var emblem = document.createElement('canvas');
          emblem.width = 512;
          emblem.height = 512;
          var ec = emblem.getContext('2d');
          if (ec) {
            // Paper background
            ec.fillStyle = '#f4f3ee';
            ec.fillRect(0, 0, 512, 512);
            // Bold outer ring
            ec.beginPath();
            ec.arc(256, 256, 200, 0, Math.PI * 2);
            ec.strokeStyle = '#11131A';
            ec.lineWidth = 36;
            ec.stroke();
            // Filled inner circle
            ec.beginPath();
            ec.arc(256, 256, 100, 0, Math.PI * 2);
            ec.fillStyle = '#11131A';
            ec.fill();
          }
          stages[3] = Inkmote.imageReveal(canvas, emblem, {
            n: N,
            seed: 3,
            shape: SHAPE,
            alt: 'A bold ring emblem assembled from ink particles',
          });
        }

        function show(i) {
          idx = (i + slides.length) % slides.length;
          slides.forEach(function (s, k) {
            s.classList.toggle("active", k === idx);
          });
          // Navigation is driven entirely by the CSS .active class toggling
          // visibility/opacity — no stage call needed here.
        }

        window.addEventListener("keydown", function (e) {
          if (e.key === "ArrowRight" || e.key === " ") {
            e.preventDefault();
            show(idx + 1);
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            show(idx - 1);
          }
        });

        // On print, snapshot each stage's current settled frame.
        // NOTE: print renders native DOM text only — the shared #ink canvas is
        // display:none in @media print. Per-slide static ink frames are a P1 item.
        window.addEventListener("beforeprint", function () {
          var rect = fullBleedRect();
          stages.forEach(function (st) {
            st.snapshotFor(rect);
          });
        });

        // Fonts: canvas text sampling must await document.fonts.ready (spec §8).
        document.fonts.ready.then(function () {
          // Sample formations after fonts load so glyph geometry is deterministic.
          var rngFrom = Inkmote.createRng(41);
          var rngTo   = Inkmote.createRng(42);
          ptsFrom = Inkmote.fromText("idea",   N, { font: FONT, levels: 24 }, rngFrom);
          ptsTo   = Inkmote.fromText("impact", N, { font: FONT, levels: 24 }, rngTo);
          buildStages();
          show(0);
        });
      })();
    </script>
  </body>
</html>
